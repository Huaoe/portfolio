# Static site deployment - no server runtime needed
# Uses Next.js static export to generate HTML/CSS/JS files
version: "1"
projects:
- name: Porfolio
  environments:
  - name: Production
    services:
    - type: web
      name: portfolio
      runtime: static
      repo: https://github.com/Huaoe/portfolio
      buildCommand: yarn --frozen-lockfile install && yarn build
      staticPublishPath: out
      autoDeployTrigger: commit
